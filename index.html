<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    body{
  background-image: url('http://img.magnific.com/premium-vector/school-building-illustration_638438-385.jpg');
  background-repeat: no-repeat;
  background-attachment: fixed;
  background-size: 100% 100%;
    }

.container {
    background-color: #ffffffbc;
  height: relative;
  width: ralative;
  position: center;
  border: 5px  gray;
  text-align: center;
  align-items: center;
  border-radius: 10px;
  
}
.form {
    align-self: center;
}

</style>
<body>
    <br>
    <div class="container">
    <form>
        <br>
        <h2>Login Form</h2>
        <label for="uname">Username</label>
            <br>
            <input type="text" id="uname" class="form-control" placeholder="Enter here" required>
            <br>  


        <label for="pwd">Password</label>
            <br>
            <input type="password" id="pwd" class="form-control" placeholder="Enter here" required>
            <br>
        <p id="display"></p>


        <input type="button" name="button" id="loginBTN" value="Login" class="btn btn-info rounded-5" onclick="authenticate()">


         <input type="reset" name="button" id="cancel" value="Cancel" class="btn btn-info rounded-5" >
         <br><br>
         </div>
    </form>


    <script>
        let attempt_counter = 0;


        function authenticate(){
            let username = document.getElementById("uname").value;
            let pwd = document.getElementById("pwd").value;
            let granted = "Welcome " + username + "!";
            let denied = "Access denied. Account locked after 3 attempts!";


        while (attempt_counter < 3) {
        if (username === "MRBEAST" && pwd === "123") {
            alert(granted);
            attempt_counter = 0; // reset attempts after successful login
            document.getElementById("display").innerHTML = "";
            window.location.href = "index.html";


            break; // stop loop
        }


        else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
            break; // stop loop for this click
        }


        }
        if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("loginBTN").disabled = true; // disable button
            }
        }
    </script>
    
</body>
</html>
