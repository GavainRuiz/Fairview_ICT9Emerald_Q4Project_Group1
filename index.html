<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skillstest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">


</head>
<style>
    body{
  background-color: #333333;
  color: #ffffff;
}

.container {
  width: 100%;
  max-width: 500px;
  margin: 1rem auto;
  padding: 1.5rem;
  background: #181818;
  box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
  position: sticky;
  top: 0;
  z-index: 10;
  border-radius: 12px;
  text-align: center;
  font-family:'Montserrat', sans-serif;
  color: #ffffff;
}
.form {
    align-self: center;
}

.form-control {
  color: #ffffff;
  background-color: #2b2b2b;
  border-color: #444444;
}

.form-control::placeholder {
  color: #cccccc;
}

.btn-info {
  color: #ffffff;
}




</style>
<body>
    <br>
    <div class="container">
    <form>
        <h2>Login Form</h2>
        <label for="uname">Username</label>
            <br>
            <input type="text" id="uname" class="form-control" placeholder="Enter here" required>
            <br>


        <label for="pwd">Password</label>
            <br>
            <input type="password" id="pwd" class="form-control" placeholder="Enter here" required>
            <br> 

        <p id="display"></p>


        <input type="button" name="button" id="loginBTN" value="Login" class="btn btn-info rounded-5" onclick="authenticate()">


         <input type="reset" name="button" id="cancel" value="Cancel" class="btn btn-info rounded-5" >
         </div>
    </form>


    <script>
        let attempt_counter = 0;


        function authenticate(){
            let username = document.getElementById("uname").value;
            let pwd = document.getElementById("pwd").value;
            let granted = "Welcome " + username + "!";
            let denied = "Access denied. Account locked after 3 attempts!";


        while (attempt_counter < 3) {
        if (username === "Darius" && pwd === "1067808day") {
            alert(granted);
            attempt_counter = 0; // reset attempts after successful login
            document.getElementById("display").innerHTML = "";
            window.location.href = "../../projectq4FINALFINAL.html";


            break; // stop loop
        }


        else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
            break; // stop loop for this click
        }


        }
        if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("loginBTN").disabled = true; // disable button
            }
        }
    </script>

</body>
</html>
