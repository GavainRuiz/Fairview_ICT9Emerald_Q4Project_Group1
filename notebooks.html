<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: #424242;
            color: #f3f3f3;
        }

        .topbar {
            background: #181818;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
            padding: 0.25rem 1rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .topbar .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.05em;
            color: white;
        }

        .topbar .nav-link,
        .topbar .nav-link:focus,
        .topbar .nav-link:hover {
            color: white !important;
            background: transparent !important;
        }

        .topbar .nav-link:hover {
            text-decoration: none;
        }

        .topbar .center-search {
            width: 520px;
            max-width: 100%;
        }

        .topbar .search-input {
            background-color: #2a2a2a;
            color: white;
            border: none;
            border-radius: 999px;
            padding: 6px 18px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.35);
            min-width: 320px;
        }

        .topbar .search-input:focus {
            background-color: #333333;
            color: white;
            outline: none;
            box-shadow: 0 0 10px rgba(100, 100, 255, 0.35);
        }

        .topbar .search-input::placeholder {
            color: #cccccc;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .topbar-actions .action-icon,
        .profile-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #2a2a2a;
            color: #fff;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        .page-wrapper {
            max-width: 1180px;
            margin: 1.5rem auto 3rem;
            padding: 0 1rem;
        }

        .hero-banner {
            position: relative;
            min-height: 260px;
            border-radius: 22px;
            background-image: url('https://i.im.ge/QMObqyL/ict.png');
            background-size: cover;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            margin-bottom: 2rem;
        }

        .hero-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.28);
            border-radius: 22px;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            padding: 2rem;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            padding: 2rem;
        }

        .hero-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 999px;
            padding: 0.55rem 1rem;
            color: #fff;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .hero-meta {
            display: inline-flex;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 999px;
            padding: 0.45rem 0.9rem;
            color: #f0f0ff;
            font-size: 0.8rem;
        }

        .hero-banner h1 {
            margin-top: 1rem;
            color: #fff;
            font-size: clamp(2rem, 2.7vw, 3rem);
            line-height: 1.05;
            max-width: 520px;
        }

        .banner-logo {
            position: absolute;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            width: 140px;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.35));
            display: inline-block;
        }

        .banner-logo img {
            width: 100%;
            display: block;
            border-radius: 12px;
        }

        .profile-card {
            background: rgba(18, 18, 18, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 22px;
            padding: 1.5rem 1.75rem;
            margin-top: -3rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }

        .profile-avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
        }

        .profile-details {
            display: flex;
            justify-content: space-between;
            flex: 1;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .profile-details div {
            min-width: 124px;
        }

        .profile-details .label {
            color: #bfbfbf;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        .profile-details .value {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .announcement-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card-panel {
            background: #232323;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 22px;
            padding: 1.5rem;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
        }

        .card-panel h2 {
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .card-pill {
            display: inline-flex;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 999px;
            padding: 0.45rem 0.9rem;
            margin-right: 0.75rem;
            margin-bottom: 0.65rem;
            color: #fff;
            font-size: 1.25 rem;
        }

        .post-preview {
            background: #1d1d1d;
            border-radius: 20px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .post-image {
            width: 100%;
            display: block;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
            object-fit: contain;
            height: auto;
        }

        .vn-panel {
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .vn-panel p {
            color: #a9a9a9;
            margin-top: 1rem;
            line-height: 1.7;
        }

        .vn-container {
            width: calc(33.33% - 20px);
            min-width: 250px;
        }

        .calendar-panel {
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .calendar-panel p {
            color: #a9a9a9;
            margin-top: 1rem;
            line-height: 1.7;
        }

        @media (max-width: 992px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .hero-banner,
            .profile-card,
            .card-panel {
                border-radius: 18px;
            }

            .hero-banner {
                min-height: 200px;
            }

            .banner-logo {
                position: static;
                transform: none;
                width: 120px;
                margin-top: 1rem;
            }

            .topbar .center-search {
                min-width: 100%;
            }
        }

        	.vnorder{
				display: flex;
				justify-content: center;
				gap:20px;
                flex-wrap: wrap;

		}

            .vn-image {
                width: 100%;
                height: 180px;
                object-fit: cover;
                border-radius: 16px;
                display: block;
}
    </style>

</head>
